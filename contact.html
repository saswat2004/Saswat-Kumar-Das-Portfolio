<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | Saswat Kumar Das</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css?v=7" />
  
  <style>
    /* Dedicated Contact Page Enhancements */
    body {
      background-color: var(--bg-primary);
    }
    .contact-page-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 120px 20px 60px;
      position: relative;
      z-index: 2;
    }
    
    .contact-card {
      background: rgba(13, 13, 20, 0.45);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(124, 108, 255, 0.15);
      border-radius: var(--radius-xl);
      padding: 50px;
      max-width: 600px;
      width: 100%;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), inset 0 0 0 1px rgba(255, 255, 255, 0.05);
      transform: translateY(40px);
      animation: fadeInUp 0.8s var(--ease-out) forwards;
    }
    
    .contact-header {
      text-align: center;
      margin-bottom: 40px;
    }
    
    .contact-header h1 {
      font-family: var(--font-heading);
      font-size: 2.5rem;
      color: var(--text-primary);
      margin-bottom: 12px;
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .contact-header p {
      color: var(--text-secondary);
      font-size: 1.1rem;
      line-height: 1.6;
    }
    
    .form-group {
      margin-bottom: 24px;
      position: relative;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.95rem;
      color: var(--accent-secondary);
      font-family: var(--font-mono);
    }
    
    .form-control {
      width: 100%;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      padding: 16px;
      border-radius: var(--radius-md);
      font-family: var(--font-main);
      font-size: 1rem;
      transition: var(--transition-fast);
      outline: none;
    }
    
    .form-control:focus {
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 4px rgba(124, 108, 255, 0.15);
      background: rgba(0, 0, 0, 0.5);
    }
    
    .form-control::placeholder {
      color: rgba(152, 152, 171, 0.4);
    }
    
    textarea.form-control {
      resize: vertical;
      min-height: 150px;
    }
    
    .btn-submit {
      width: 100%;
      padding: 18px;
      font-size: 1.1rem;
      margin-top: 10px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #9898ab;
      font-family: var(--font-mono);
      text-decoration: none;
      margin-bottom: 30px;
      transition: var(--transition-fast);
      font-size: 0.95rem;
    }
    
    .back-link:hover {
      color: var(--accent-primary);
      transform: translateX(-4px);
    }
    
    @media (max-width: 768px) {
      .contact-card {
        padding: 30px 20px;
      }
      .contact-header h1 {
        font-size: 2rem;
      }
    }
  </style>
</head>

<body>
  <!-- ===== Vanta.js 3D Animated Background ===== -->
  <div id="vanta-bg"></div>
  <canvas id="particleCanvas"></canvas>
  <div class="cursor-glow" id="cursorGlow"></div>

  <!-- ===== Navigation ===== -->
  <nav class="navbar" id="navbar">
    <a href="index.html" class="nav-logo">
      <span class="logo-bracket">&lt;</span>SKD<span class="logo-bracket"> /&gt;</span>
    </a>
    <ul class="nav-links">
      <li><a href="index.html" class="active">Home</a></li>
    </ul>
  </nav>

  <!-- ===== Contact Form Area ===== -->
  <div class="contact-page-container">
    <div class="contact-card">
      <a href="index.html" class="back-link">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        Return to Portfolio
      </a>
      
      <div class="contact-header">
        <h1>Let's Connect</h1>
        <p>Whether you have a data challenge, a career opportunity, or an analytics question, I'm ready to help.</p>
      </div>

      <!-- Contact form handler simulator -->
      <form id="contactForm" onsubmit="handleFormSubmit(event)">
        <div class="form-group">
          <label for="name">01. Your Name</label>
          <input type="text" id="name" name="name" class="form-control" placeholder="John Doe" required />
        </div>
        <div class="form-group">
          <label for="email">02. Email Address</label>
          <input type="email" id="email" name="email" class="form-control" placeholder="john@example.com" required />
        </div>
        <div class="form-group">
          <label for="subject">03. Subject</label>
          <input type="text" id="subject" name="subject" class="form-control" placeholder="Data Analytics Role / Dashboard Project" required />
        </div>
        <div class="form-group">
          <label for="message">04. Message</label>
          <textarea id="message" name="message" class="form-control" placeholder="Tell me about your project or opportunity..." required></textarea>
        </div>
        <button type="submit" class="btn btn-primary btn-submit">
          <span class="btn-glow"></span>
          Send Message 🚀
        </button>
      </form>
    </div>
  </div>

  <footer class="footer">
    <p>Designed & Built by <strong>Saswat Kumar Das</strong></p>
    <p class="footer-sub">&copy; 2026 — All rights reserved.</p>
  </footer>

  <!-- Scripts required to keep the animated background consistent -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>
  <script src="script.js?v=7"></script>
  <script>
    function handleFormSubmit(e) {
      e.preventDefault();
      const btn = e.target.querySelector('button[type="submit"]');
      const originalText = btn.innerHTML;
      btn.innerHTML = '<span class="btn-glow"></span>Sending...';
      btn.style.opacity = '0.7';
      
      setTimeout(() => {
        btn.innerHTML = '<span class="btn-glow"></span>Message Sent! ✨';
        btn.style.opacity = '1';
        btn.style.background = 'rgba(76, 175, 80, 0.2)';
        btn.style.borderColor = '#4CAF50';
        btn.style.color = '#4CAF50';
        e.target.reset();
        
        setTimeout(() => {
          btn.innerHTML = originalText;
          btn.style.background = '';
          btn.style.borderColor = '';
          btn.style.color = '';
        }, 4000);
      }, 1500);
    }
  </script>
</body>
</html>
